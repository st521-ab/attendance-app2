名称: 构建APK

触发:
推送:
分支: [main]
工作流触发:

作业:
构建:
运行于: ubuntu-latest
步骤:
      - uses: actions/checkout@v3
      
      - name: 使用Buildozer构建
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: .
          buildozer_version: stable
      
      - name: 上传APK
用途: actions/upload-artifact@v3
与:
          name: app
          path: ${{ steps.buildozer.outputs.filename }}
